<!DOCTYPE html>
<html>
<head>
    <title>CareFlow AI - Error</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚠️ Error</h1>
        </div>
        <div class="form-container" style="text-align: center; padding: 50px;">
            <div class="error-message" style="background: #ffebee; padding: 30px; border-radius: 10px; border-left: 5px solid #e74c3c;">
                <h2 style="color: #c62828;">{{ message }}</h2>
                <p style="margin: 20px 0;">Please try again or contact support.</p>
                <a href="/" class="back-btn" style="display: inline-block; margin-top: 20px;">← Return to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
